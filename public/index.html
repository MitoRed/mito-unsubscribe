<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribe — Mito Red Light</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c1272d;
      --border: #e5e5e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    p {
      color: var(--muted);
      line-height: 1.55;
      margin: 0 0 24px;
      font-size: 15px;
    }
    .email-display {
      background: #f7f7f7;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      margin-bottom: 24px;
      word-break: break-all;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      min-width: 180px;
    }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.success { color: #2a7d3f; }
    .status.error { color: var(--accent); }
    .small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 32px;
    }
    a { color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Mito Red Light</div>
    <h1 id="headline">Unsubscribe from our emails</h1>
    <p id="desc">Confirm below and we'll remove you from all email outreach. No further messages.</p>

    <div class="email-display" id="emailDisplay">—</div>

    <button id="confirmBtn" onclick="unsubscribe()">Confirm unsubscribe</button>
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="small">
      Mito Red Light · B2B · <a href="https://mitoredforbusiness.com">mitoredforbusiness.com</a>
    </div>
  </main>

  <script>
    // Read email from query string: /unsubscribe?email=foo@bar.com&campaign_id=3165592
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    const campaignId = params.get('campaign_id') || '';

    const emailDisplay = document.getElementById('emailDisplay');
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('confirmBtn');
    const headline = document.getElementById('headline');
    const desc = document.getElementById('desc');

    if (!email) {
      emailDisplay.textContent = 'No email address found in link';
      btn.disabled = true;
      statusEl.className = 'status error';
      statusEl.textContent = 'This unsubscribe link is missing required info. Reply STOP to any email and we\'ll handle it manually.';
    } else {
      emailDisplay.textContent = email;
    }

    async function unsubscribe() {
      btn.disabled = true;
      statusEl.className = 'status';
      statusEl.textContent = 'Processing...';

      try {
        // Post to the serverless function. Relative path = same-origin, so this
        // works whether the page is served from mitoredforbusiness.com or from
        // unsubscribe.mitoredforbusiness.com. Never expose the API key in
        // client-side JS — the server fn at api/unsubscribe.js holds it as env var.
        const endpoint = '/api/unsubscribe';

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, campaign_id: campaignId }),
        });

        // DEBUG: capture full response so failures surface on-page, no DevTools needed.
        const bodyText = await res.text();

        if (!res.ok) {
          btn.disabled = false;
          statusEl.className = 'status error';
          statusEl.innerHTML = 'Something went wrong (HTTP ' + res.status + ').<br><br>' +
            '<pre style="text-align:left;font-size:11px;white-space:pre-wrap;word-break:break-word;background:#f7f7f7;padding:12px;border-radius:6px;">' +
            bodyText.replace(/</g, '&lt;') + '</pre>';
          return;
        }

        headline.textContent = 'You\'re unsubscribed';
        desc.textContent = 'We\'ve removed ' + email + ' from all future email outreach. It may take up to 24 hours to process.';
        btn.style.display = 'none';
        statusEl.className = 'status success';
        statusEl.textContent = '';
      } catch (err) {
        btn.disabled = false;
        statusEl.className = 'status error';
        statusEl.textContent = 'Something went wrong: ' + err.message;
      }
    }
  </script>
</body>
</html>
